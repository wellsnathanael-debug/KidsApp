name: Publish to GitHub Pages

# GitHub Pages serves this site from the gh-pages branch; this workflow
# keeps gh-pages in sync with main so pushing to main updates the site.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
